name: FastAPI Local CI-CD

on:
  push:
    branches: ["main"] # Runs every time you push to the 'main' branch

jobs:
  continuous-integration:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: python -m  pip install --upgrade pip 
            pip install -r requirements.txt

      - name: Run Pytest
        run: pytest

  continuous-deployment:
    needs:  continuous-integration
    runs-on: self-hosted
    steps:
      - name: Restart FastAPI Server
        run:  | 
          echo "Deploying..."
          # This kills the old server and starts the new one in the background
            pkill uvicorn || echo "No server was running"
            nohup uvicorn main:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 &
