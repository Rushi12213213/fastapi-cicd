name: FastAPI Local CI-CD

on:
  push:
    branches: ["main"] # Runs every time you push to the 'main' branch

jobs:
  continuous-integration:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          python3.11 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Pytest
        run: |
          source venv/bin/activate
          pytest

  continuous-deployment:
    needs: continuous-integration
    runs-on: self-hosted

    steps:
      - name: Restart FastAPI Server
        env:
          RUNNER_TRACK_PROCESSES: false
        run: |
          source venv/bin/activate

          echo "Stopping old server..."
          pkill uvicorn || echo "No server was running"

          echo "Starting new server..."
          # 1. Start with nohup and move to background
          # 2. Immediately 'disown' the last background process ($!)
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 & 
          disown $! 

          echo "Server started and disowned."
          sleep 2
          pgrep -x "uvicorn" && echo "✅ Process is alive in background"
